<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Créer un compte</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 5.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM9.9 19.1l1-4.4 2.1 2V22h2v-5.7l-2.1-2 .6-3c1.3 1.5 3.3 2.7 5.5 2.7v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 10.3V15h2v-3.4l2.1-.8-1.8 8.3H6l-1 2h4.1l.8-2Z"/>
      </svg>
    </div>
    <span class="brand-name">Swee<span>lo</span></span>
  </div>

  <div class="heading">
    <h1>Crée ton compte</h1>
    <p>Rejoins la communauté et suis tes performances.</p>
  </div>

  <div class="alert" id="alert" role="alert" aria-live="polite">
    <svg id="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="alert-msg"></span>
  </div>

  <form class="form" id="register-form" novalidate>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" placeholder="toi@exemple.com" autocomplete="email" required />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <span class="hint" id="email-hint"></span>
    </div>

    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username" placeholder="ton_pseudo" autocomplete="username" minlength="3" maxlength="30" pattern="^[a-zA-Z0-9_\-]+$" required />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="hint" id="username-hint">3–30 caractères, lettres, chiffres, _ ou -</span>
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="8 caractères minimum" autocomplete="new-password" minlength="8" required />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher le mot de passe">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-bar-fill" id="strength-fill"></div></div>
      <span class="hint" id="password-hint"></span>
    </div>

    <div class="field">
      <label for="confirm-password">Confirme le mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Répète ton mot de passe" autocomplete="new-password" required />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="hint" id="confirm-hint"></span>
    </div>

    <div class="divider">ou déjà membre ?</div>

    <button type="submit" class="btn-submit" id="submit-btn">
      Créer mon compte
      <span class="spinner"></span>
    </button>

  </form>

  <div class="footer">
    Tu as déjà un compte ? <a href="login.html">Se connecter</a>
  </div>

</div>

<script src="register.js"></script>
</body>
</html>
