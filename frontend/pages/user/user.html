<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Profil</title>
  <link rel="stylesheet" href="user.css" />
  <link rel="stylesheet" href="../../nav.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../files/sweelo-logo.png" />
</head>
<body>

  <nav class="sidenav">
    <a href="../../index.html" class="nav-brand">
      <img src="../../files/sweelo-logo.png" alt="Sweelo" class="nav-logo" />
      <span class="nav-brand-name">Sweelo</span>
    </a>

    <div class="nav-links">
      <a href="../feed/feed.html" title="Accueil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Accueil</span>
      </a>
      <a href="../activities/activities.html" title="Activités">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Activités</span>
      </a>
      <a href="../search/search.html" title="Rechercher">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="nav-label">Rechercher</span>
      </a>
      <a href="../profile/profile.html" title="Profil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Profil</span>
      </a>
      <a href="../admin/admin.html" id="admin-nav-link" class="hidden" title="Administration">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="nav-label">Administration</span>
      </a>
    </div>

    <button id="logout-btn" class="btn-logout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="nav-label">Déconnexion</span>
    </button>
  </nav>

  <main>

    <!-- Bouton retour -->
    <button id="back-btn" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Retour
    </button>

    <!-- Carte profil -->
    <section class="profile-card" id="profile-card">
      <div class="avatar" id="avatar">—</div>
      <div class="profile-info">
        <h1 id="username">Chargement…</h1>
        <p id="join-date" class="muted"></p>
      </div>
      <button id="friend-btn" class="btn-friend hidden">…</button>
    </section>

    <!-- Statistiques -->
    <section class="stats-row">
      <div class="stat-card">
        <span class="stat-value" id="stat-activities">—</span>
        <span class="stat-label">Activités</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-friends">—</span>
        <span class="stat-label">Amis</span>
      </div>
    </section>

    <!-- Activités de l'utilisateur (visible uniquement si amis) -->
    <section id="user-posts-section" class="hidden">
      <h2 class="section-title">Activités</h2>
      <div id="user-posts-loader" class="posts-loader hidden">
        <span class="spinner-lg"></span>
      </div>
      <div id="user-posts-container"></div>
      <p id="user-posts-empty" class="posts-empty hidden">Aucune activité publiée.</p>
      <button id="user-posts-more" class="btn-load-more hidden">Charger plus</button>
    </section>

    <!-- État d'erreur (user introuvable) -->
    <div id="error-state" class="error-state hidden">
      <p>Utilisateur introuvable.</p>
      <a href="../feed/feed.html" class="btn-primary">Retour au feed</a>
    </div>

  </main>

  <script src="../../admin-nav.js"></script>
  <script src="user.js"></script>
</body>
</html>
