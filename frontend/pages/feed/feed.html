<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Feed</title>
  <link rel="stylesheet" href="feed.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../files/sweelo-logo.png" />
</head>
<body>

  <nav class="topnav">
    <a href="../../index.html" class="nav-brand">
      <img src="../../files/sweelo-logo.png" alt="Sweelo" class="nav-logo" />
    </a>

    <div class="nav-links">
      <a href="feed.html" class="active"><img src="../../files/icon-feed.png" class="nav-item-icon" alt="" />Feed</a>
      <a href="../activities/activities.html">Activités</a>
      <a href="../search/search.html" title="Rechercher">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </a>
      <a href="../profile/profile.html"><img src="../../files/icon-profile.png" class="nav-item-icon" alt="" />Profil</a>
    </div>

    <button id="logout-btn" class="btn-logout">Déconnexion</button>
  </nav>

  <main>

    <div id="feed-container"></div>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <h2>Ton feed est vide</h2>
      <p>Ajoute des amis pour voir leurs activités ici, ou enregistre ta première activité !</p>
      <a href="../activities/activities.html" class="btn-primary">Enregistrer une activité</a>
    </div>

    <div id="loader" class="loader hidden">
      <span class="spinner-lg"></span>
    </div>

    <button id="load-more" class="btn-load-more hidden">Charger plus</button>

    <p id="feed-end" class="feed-end hidden">Tu es à jour !</p>

  </main>

  <script src="feed.js"></script>
</body>
</html>
