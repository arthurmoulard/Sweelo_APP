<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Se connecter</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 5.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM9.9 19.1l1-4.4 2.1 2V22h2v-5.7l-2.1-2 .6-3c1.3 1.5 3.3 2.7 5.5 2.7v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 10.3V15h2v-3.4l2.1-.8-1.8 8.3H6l-1 2h4.1l.8-2Z"/>
      </svg>
    </div>
    <span class="brand-name">Swee<span>lo</span></span>
  </div>

  <div class="heading">
    <h1>Connecte-toi pour continuer</h1>
    <p>Rejoins la communauté et suis tes performances.</p>
  </div>

  <!-- Alerte succès / erreur -->
  <div class="alert" id="alert" role="alert" aria-live="polite">
    <svg id="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="alert-msg"></span>
  </div>

  <form class="form" id="login-form" novalidate>

    <!-- Champ email — id harmonisé avec le JS -->
    <div class="field">
      <label for="email">Adresse e-mail</label>
      <div class="input-wrap">
        <input
          type="email"
          id="email"
          name="email"
          placeholder="adresse@email.com"
          autocomplete="email"
          required
        />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <span class="hint" id="email-hint"></span>
    </div>

    <!-- Champ mot de passe — sans barre de force (login ≠ register) -->
    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ton mot de passe"
          autocomplete="current-password"
          required
        />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher le mot de passe">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="hint" id="password-hint"></span>
    </div>

    <button type="submit" class="btn-submit" id="submit-btn">
      <span class="btn-label">Se connecter</span>
      <span class="spinner" aria-hidden="true"></span>
    </button>

  </form>

  <div class="footer">
    Pas encore de compte ? <a href="register.html">Créer un compte</a>
  </div>

</div>

<script src="../js/login.js"></script>
</body>
</html>
