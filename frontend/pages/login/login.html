<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Connexion</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../files/sweelo-logo.png" />
</head>
<body>

<div class="card">

  <div class="brand">
    <img src="../../files/sweelo-logo.png" alt="Sweelo" class="brand-logo" />
    <span class="brand-name">Swee<span>lo</span></span>
  </div>

  <div class="heading">
    <h1>Bon retour !</h1>
    <p>Connecte-toi pour retrouver tes performances.</p>
  </div>

  <div class="alert" id="alert" role="alert" aria-live="polite">
    <svg id="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="alert-msg"></span>
  </div>

  <form class="form" id="login-form" novalidate>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" placeholder="toi@exemple.com" autocomplete="email" required />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <span class="hint" id="email-hint"></span>
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Ton mot de passe" autocomplete="current-password" required />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Afficher le mot de passe">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="hint" id="password-hint"></span>
    </div>

    <div class="divider">ou nouveau ici ?</div>

    <button type="submit" class="btn-submit" id="submit-btn">
      Se connecter
      <span class="spinner"></span>
    </button>

  </form>

  <div class="footer">
    Pas encore de compte ? <a href="../register/register.html">Créer un compte</a>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
