<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Profil</title>
  <link rel="stylesheet" href="profile.css" />
  <link rel="stylesheet" href="../../nav.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../files/sweelo-logo.png" />
</head>
<body>

  <nav class="sidenav">
    <a href="../../index.html" class="nav-brand">
      <img src="../../files/sweelo-logo.png" alt="Sweelo" class="nav-logo" />
      <span class="nav-brand-name">Sweelo</span>
    </a>

    <div class="nav-links">
      <a href="../feed/feed.html" title="Accueil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Accueil</span>
      </a>
      <a href="../activities/activities.html" title="Activités">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Activités</span>
      </a>
      <a href="../search/search.html" title="Rechercher">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="nav-label">Rechercher</span>
      </a>
      <a href="profile.html" class="active" title="Profil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Profil</span>
      </a>
      <a href="../admin/admin.html" id="admin-nav-link" class="hidden" title="Administration">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="nav-label">Administration</span>
      </a>
    </div>

    <button id="logout-btn" class="btn-logout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="nav-label">Déconnexion</span>
    </button>
  </nav>

  <main>

    <section class="profile-card" id="profile-card">
      <div class="avatar-wrapper" id="avatar-wrapper" title="Changer la photo de profil">
        <div class="avatar" id="avatar">—</div>
        <div class="avatar-overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp,image/gif" hidden />
      </div>
      <div class="profile-info">
        <h1 id="username">Chargement…</h1>
        <p id="email" class="muted"></p>
        <p id="join-date" class="muted"></p>
      </div>
      <button id="edit-btn" class="btn-primary">Modifier le profil</button>
    </section>

    <section class="stats-row">
      <div class="stat-card">
        <span class="stat-value" id="stat-activities">—</span>
        <span class="stat-label">Activités</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-km">—</span>
        <span class="stat-label">Kilomètres</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-hours">—</span>
        <span class="stat-label">Heures</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-friends">—</span>
        <span class="stat-label">Amis</span>
      </div>
    </section>

    <section class="section-card">
      <h2>Mes amis</h2>
      <div id="friends-list" class="friends-grid">
        <p class="placeholder">Chargement…</p>
      </div>
    </section>

  </main>

  <div id="edit-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <h2 id="modal-title">Modifier le profil</h2>

      <div id="modal-alert" class="alert hidden" role="alert"></div>

      <div class="field">
        <label for="edit-username">Nom d'utilisateur</label>
        <input type="text" id="edit-username" autocomplete="username" />
        <span class="hint" id="err-username"></span>
      </div>

      <div class="field">
        <label for="edit-email">Adresse e-mail</label>
        <input type="email" id="edit-email" autocomplete="email" />
        <span class="hint" id="err-email"></span>
      </div>

      <div class="field">
        <label for="edit-password">Nouveau mot de passe <span class="label-opt">(laisser vide pour ne pas changer)</span></label>
        <input type="password" id="edit-password" autocomplete="new-password" />
        <span class="hint" id="err-password"></span>
      </div>

      <div class="modal-actions">
        <button id="cancel-btn" class="btn-secondary">Annuler</button>
        <button id="save-btn" class="btn-primary">
          Enregistrer
          <span class="spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <script src="../../admin-nav.js"></script>
  <script src="profile.js"></script>
</body>
</html>
