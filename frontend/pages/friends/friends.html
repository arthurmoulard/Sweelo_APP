<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweelo — Amis</title>
  <link rel="stylesheet" href="friends.css" />
  <link rel="stylesheet" href="../../nav.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../files/sweelo-logo.png" />
</head>
<body>

  <nav class="sidenav">
    <a href="../../index.html" class="nav-brand">
      <img src="../../files/sweelo-logo.png" alt="Sweelo" class="nav-logo" />
      <span class="nav-brand-name">Sweelo</span>
    </a>

    <div class="nav-links">
      <a href="../feed/feed.html" title="Accueil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Accueil</span>
      </a>
      <a href="../activities/activities.html" title="Activités">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label">Activités</span>
      </a>
      <a href="../search/search.html" class="active" title="Rechercher">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="nav-label">Rechercher</span>
      </a>
      <a href="../profile/profile.html" title="Profil">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Profil</span>
      </a>
    </div>

    <button id="logout-btn" class="btn-logout">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="nav-label">Déconnexion</span>
    </button>
  </nav>

  <main>

    <!-- Recherche de sportifs -->
    <section class="section-card">
      <h2>Trouver des sportifs</h2>

      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Rechercher par pseudo (2 caractères min.)…"
          autocomplete="off"
          maxlength="50"
        />
      </div>

      <div id="search-loader" class="loader hidden">
        <span class="spinner-sm"></span>
        <span class="loader-text">Recherche…</span>
      </div>
      <div id="search-empty" class="placeholder hidden">Aucun utilisateur trouvé.</div>
      <div id="search-results" class="user-grid hidden"></div>
    </section>

    <!-- Liste de mes amis -->
    <section class="section-card">
      <div class="section-head">
        <h2>Mes amis</h2>
        <span id="friends-count" class="count-badge hidden"></span>
      </div>

      <div id="friends-loader" class="loader">
        <span class="spinner-sm"></span>
        <span class="loader-text">Chargement…</span>
      </div>
      <div id="friends-empty" class="placeholder hidden">
        Tu n'as pas encore d'amis. Recherche des sportifs ci-dessus !
      </div>
      <div id="friends-list" class="user-grid hidden"></div>
    </section>

  </main>

  <script src="friends.js"></script>
</body>
</html>
